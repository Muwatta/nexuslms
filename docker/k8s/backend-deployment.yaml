apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexuslms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexuslms-backend
  template:
    metadata:
      labels:
        app: nexuslms-backend
    spec:
      containers:
        - name: backend
          image: registry.example.com/nexuslms/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexuslms-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nexuslms-secrets
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
